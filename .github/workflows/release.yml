name: Build & Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          pip install pyinstaller
          pip install PyQt6 numpy dashscope openai loguru pynput pyperclip tzdata comtypes
          pip install pyaudio --only-binary=:all:

      - name: Build single-file exe
        run: python scripts/build.py --onefile

      - name: Rename artifact with version
        shell: pwsh
        run: |
          $version = (Get-Content VERSION).Trim()
          $src = "dist/VoiceInput.exe"
          $dst = "dist/VoiceInput-${version}-portable.exe"
          if (Test-Path $src) { Move-Item $src $dst }

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/VoiceInput-*-portable.exe
          generate_release_notes: true
