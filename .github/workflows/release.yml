name: Build & Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      - name: Install build dependencies
        run: |
          pip install pyinstaller Pillow
          pip install -r src/requirements.txt

      - name: Generate app icon
        run: python scripts/render_app_icons.py

      - name: Build all artifacts
        run: python scripts/build.py --all

      - name: Generate release body
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          python scripts/generate_release_body.py `
            --version $version `
            --current-tag "${{ github.ref_name }}" `
            --repo-url "https://github.com/${{ github.repository }}" `
            --output release_body.md

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          name: "VoiceInput ${{ github.ref_name }}"
          body_path: release_body.md
          files: |
            dist/VoiceInput-*-portable.exe
            dist/VoiceInput-*-portable.zip
            dist/VoiceInput-*-setup.exe
