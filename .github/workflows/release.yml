name: Build & Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Sync VERSION from tag
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          Set-Content -Path VERSION -Value $version -NoNewline
          Write-Host "VERSION set to: $version"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      - name: Install build dependencies
        run: |
          pip install pyinstaller Pillow
          pip install -r src/requirements.txt

      - name: Generate app icon
        run: python scripts/render_app_icons.py

      - name: Build all artifacts
        run: python scripts/build.py --all

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          name: VoiceInput v${{ github.ref_name }}
          body: |
            ## VoiceInput ${{ github.ref_name }}

            ### 下载

            | 文件 | 说明 |
            |------|------|
            | `VoiceInput-*-setup.exe` | 安装包（推荐） |
            | `VoiceInput-*-portable.zip` | 便携版（解压即用） |
            | `VoiceInput-*-portable.exe` | 单文件版（体积较大，启动较慢） |

            ---
            **系统要求**：Windows 10/11 64-bit
          files: |
            dist/VoiceInput-*-portable.exe
            dist/VoiceInput-*-portable.zip
            dist/VoiceInput-*-setup.exe
          generate_release_notes: true
